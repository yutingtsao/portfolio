<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected — Tiffany Tsao</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900&family=Newsreader:wght@300..500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a18;--paper:#f4f1ea;--accent:#c4502e;--muted:#8a8578;--line:#d6d0c4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:'Newsreader',serif;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
nav{padding:18px 40px;display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line)}
.logo{font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:-.02em}
.logo span{color:var(--accent)}
.back{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.back:hover{color:var(--accent)}
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.gate{width:100%;max-width:420px;text-align:center}
.gate .ico{font-size:34px;color:var(--accent);margin-bottom:24px}
.gate .tag{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.gate h1{font-family:'Fraunces',serif;font-weight:300;font-size:42px;letter-spacing:-.02em;line-height:1.05;margin-bottom:18px}
.gate p{color:var(--muted);font-size:17px;margin-bottom:34px;line-height:1.55}
.field{display:flex;gap:10px}
.field input{flex:1;font-family:'Space Mono',monospace;font-size:14px;padding:14px 16px;border:1px solid var(--line);border-radius:3px;background:#fff;color:var(--ink);letter-spacing:.05em}
.field input:focus{outline:none;border-color:var(--accent)}
.field button{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:0 22px;background:var(--ink);color:var(--paper);border:none;border-radius:3px;cursor:pointer;transition:background .25s}
.field button:hover{background:var(--accent)}
.err{color:var(--accent);font-family:'Space Mono',monospace;font-size:12px;margin-top:16px;min-height:18px;letter-spacing:.04em}
.hint{margin-top:30px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
/* unlocked content */
.vault{display:none;max-width:680px;text-align:left}
.vault.show{display:block}
.vault h1{font-family:'Fraunces',serif;font-weight:300;font-size:44px;letter-spacing:-.02em;margin-bottom:30px}
.vault .pj{padding:28px 0;border-top:1px solid var(--line)}
.vault .pj .c{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.vault .pj h3{font-family:'Fraunces',serif;font-weight:400;font-size:26px;margin-bottom:8px}
.vault .pj p{color:var(--muted);font-size:16px}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Tiffany<span>.</span>Tsao</a>
  <a href="index.html" class="back">← Back to Work</a>
</nav>

<div class="center">
  <div class="gate" id="gate">
    <div class="ico">⬡</div>
    <div class="tag">Confidential</div>
    <h1>受保護的案例</h1>
    <p>部分專案受保密協議限制，僅於面試時開放。請輸入您收到的專屬密碼。</p>
    <div class="field">
      <input type="password" id="pw" placeholder="ENTER PASSWORD" onkeydown="if(event.key==='Enter')check()">
      <button onclick="check()">Unlock</button>
    </div>
    <div class="err" id="err"></div>
    <div class="hint">提示密碼可向 Tiffany 索取</div>
  </div>

  <div class="vault" id="vault">
    <h1>機密案例</h1>
    <p style="color:var(--muted);margin-bottom:10px;font-size:17px">歡迎。以下為僅供面試開放的完整專案。</p>
    <div class="pj"><div class="c">Project · A</div><h3>案例名稱一</h3><p>在此放入完整 case study 連結或內容。妳可以把這裡換成另一頁的連結。</p></div>
    <div class="pj"><div class="c">Project · B</div><h3>案例名稱二</h3><p>同上，依需求增減專案區塊。</p></div>
  </div>
</div>

<script>
// 簡易前端密碼閘門。注意：前端密碼僅能擋住一般人，無法做到真正加密。
// 若案例高度機密，建議改用後端驗證或不公開連結。
const PASSWORD="tiffany2026";
function check(){
  const v=document.getElementById('pw').value.trim();
  if(v===PASSWORD){
    document.getElementById('gate').style.display='none';
    document.getElementById('vault').classList.add('show');
  }else{
    document.getElementById('err').textContent='× 密碼錯誤，請再試一次';
    document.getElementById('pw').value='';
  }
}
</script>
</body>
</html>
